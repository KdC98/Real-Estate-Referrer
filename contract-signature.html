<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 min-h-screen text-white">
    <div id="app"></div>
    
    <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
    (async () => {

            .use(i18nextBrowserLanguageDetector)
            .init({

                backend: { loadPath: '/locales/{{lng}}/{{ns}}.json' },
                detection: { order: ['localStorage', 'navigator'], caches: ['localStorage'] }

        await i18next.loadNamespaces(['translation', 'contract']);
        const t = (key) => i18next.t(key);
        
        const SUPABASE_URL = 'https://cgizcgwhwxswvoodqver.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnaXpjZ3dod3hzd3Zvb2RxdmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA0MzY1NDYsImV4cCI6MjA3NjAxMjU0Nn0.d5PWoeuz6Z322dnvLLKg4LBb6jUhWo4MyxlIGdxA3oc';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let canvas, ctx;
        let isDrawing = false;
        let hasSignature = false;
        let hasAcceptedTerms = false;
        
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { renderAccessDenied(); return false; }
            currentUser = session.user;
            return true;
        }
        
        function renderAccessDenied() {
            // Fix #2: emoji ⚠️ supprimé
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="bg-white/10 backdrop-blur-md rounded-2xl p-8 max-w-md text-center border border-white/20">
                        <svg class="w-16 h-16 text-red-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                        <h1 class="text-2xl font-bold text-red-400 mb-4">${t('contract:access_denied')}</h1>
                        <p class="text-blue-200 mb-6">${t('contract:must_login')}</p>
                        <a href="/" class="bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-6 rounded-lg inline-block transition">
                            ${t('contract:go_to_login')}
                        </a>
                    </div>
                </div>
            `;
        }
        
        function renderSignaturePage() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen p-4">
                    <div class="max-w-4xl mx-auto">
                        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 mb-6 border border-white/20">
                            <a href="/" class="text-blue-200 hover:text-white mb-4 inline-flex items-center transition">
                                <!-- Fix #2: ← texte au lieu d'emoji -->
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                                Retour au dashboard
                            </a>
                            <h1 class="text-3xl font-bold text-yellow-400 mb-2">${t('contract:header_title')}</h1>
                            <p class="text-blue-200">${t('contract:header_subtitle')}</p>
                        </div>
                        
                        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 mb-6 border border-white/20">
                            <div class="flex items-start justify-between mb-4">
                                <div>
                                    <h2 class="text-xl font-bold text-yellow-400 mb-2">${t('contract:what_is_contract')}</h2>
                                    <p class="text-blue-200 text-sm">${t('contract:contract_intro')}</p>
                                </div>
                            </div>
                            
                            <div class="space-y-3 text-blue-200 text-sm">
                                <div class="flex items-start gap-2"><span class="text-green-400 text-xl">✓</span><div><strong class="text-white">${t('contract:guarantee_commission')}</strong> ${t('contract:guarantee_commission_text')}</div></div>
                                <div class="flex items-start gap-2"><span class="text-green-400 text-xl">✓</span><div><strong class="text-white">${t('contract:lead_protection')}</strong> ${t('contract:lead_protection_text')}</div></div>
                                <div class="flex items-start gap-2"><span class="text-green-400 text-xl">✓</span><div><strong class="text-white">${t('contract:fast_payment')}</strong> ${t('contract:fast_payment_text')}</div></div>
                                <div class="flex items-start gap-2"><span class="text-green-400 text-xl">✓</span><div><strong class="text-white">${t('contract:transparency')}</strong> ${t('contract:transparency_text')}</div></div>
                                <div class="flex items-start gap-2"><span class="text-green-400 text-xl">✓</span><div><strong class="text-white">${t('contract:rera_compliance')}</strong> ${t('contract:rera_compliance_text')}</div></div>
                            </div>
                            
                            <!-- Fix #2: emoji ℹ️ supprimé -->
                            <div class="bg-blue-900/30 border border-blue-500/30 rounded-xl p-4 mt-6">
                                <p class="text-blue-200 text-sm">${t('contract:full_contract_notice')}</p>
                            </div>
                            
                            <div class="border-t border-white/10 pt-4 mt-4">
                                <!-- Fix #2: emoji 📄 supprimé -->
                                <a href="/contract-template.html" target="_blank" 
                                   class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-lg transition">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                    ${t('contract:read_full_contract')}
                                </a>
                            </div>
                        </div>
                        
                        <!-- Fix #2: emoji ⚠️ supprimé -->
                        <div class="bg-gradient-to-r from-yellow-900/40 to-orange-900/30 rounded-2xl p-6 mb-6 border-2 border-yellow-500 shadow-lg shadow-yellow-500/20">
                            <div class="flex items-center gap-3 mb-4">
                                <svg class="w-7 h-7 text-yellow-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                                <p class="text-yellow-300 font-bold text-lg">${t('contract:step_required') || 'Required step before signing'}</p>
                            </div>
                            <label class="flex items-start gap-4 cursor-pointer group">
                                <div class="relative mt-1 flex-shrink-0">
                                    <input type="checkbox" id="acceptTerms" onchange="toggleAcceptance()"
                                        class="w-6 h-6 text-yellow-500 bg-slate-700 border-2 border-yellow-400 rounded focus:ring-yellow-500 focus:ring-2 cursor-pointer"/>
                                </div>
                                <span class="text-white">
                                    <strong class="text-yellow-300 text-base">${t('contract:accept_terms')}</strong><br>
                                    <span class="text-blue-200 text-sm">${t('contract:accept_terms_text')}</span>
                                </span>
                            </label>
                        </div>
                        
                        <div id="signatureSection" class="bg-white/10 backdrop-blur-md rounded-2xl p-6 mb-6 border border-white/20 opacity-50 pointer-events-none">
                            <div class="bg-gradient-to-r from-green-900/30 to-blue-900/30 border-2 border-green-500/30 rounded-xl p-6 mb-6">
                                <div class="flex items-start gap-3">
                                    <!-- Fix #2: emoji ✍️ supprimé, remplacé SVG -->
                                    <svg class="w-10 h-10 text-green-400 flex-shrink-0 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                    <div>
                                        <h3 class="text-xl font-bold text-green-400 mb-2">${t('contract:electronic_signature')}</h3>
                                        <p class="text-blue-200 text-sm mb-3">${t('contract:electronic_signature_intro')}</p>
                                        <div class="space-y-1 text-sm text-blue-200">
                                            <div class="flex items-center gap-2"><span class="text-green-400">✓</span><span>${t('contract:signature_feature_1')}</span></div>
                                            <div class="flex items-center gap-2"><span class="text-green-400">✓</span><span>${t('contract:signature_feature_2')}</span></div>
                                            <div class="flex items-center gap-2"><span class="text-green-400">✓</span><span>${t('contract:signature_feature_3')}</span></div>
                                            <div class="flex items-center gap-2"><span class="text-green-400">✓</span><span>${t('contract:signature_feature_4')}</span></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <h2 class="text-xl font-bold text-yellow-400 mb-4">${t('contract:sign_now')}</h2>
                            <p class="text-blue-200 mb-4">${t('contract:signature_instruction')}</p>
                            
                            <div class="bg-white rounded-xl p-4 mb-4 shadow-lg">
                                <canvas id="signatureCanvas" width="700" height="200" class="w-full rounded-lg"></canvas>
                            </div>
                            
                            <div class="flex gap-4">
                                <!-- Fix #2: emoji 🗑️ supprimé -->
                                <button onclick="clearSignature()" class="flex-1 flex items-center justify-center gap-2 bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-lg transition">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                    ${t('contract:clear_button')}
                                </button>
                                <!-- Fix #2: emoji ✅ supprimé -->
                                <button id="validateBtn" onclick="validateSignature()" disabled
                                    class="flex-1 flex items-center justify-center gap-2 bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                                    ${t('contract:validate_button')}
                                </button>
                            </div>
                            
                            <div id="errorMsg" class="hidden mt-4 bg-red-500/20 border border-red-500 text-red-200 p-4 rounded-lg"></div>
                            <div id="successMsg" class="hidden mt-4 bg-green-500/20 border border-green-500 text-green-200 p-4 rounded-lg"></div>
                        </div>
                        
                        <!-- Fix #2: emoji ℹ️ supprimé -->
                        <div class="bg-blue-900/30 border border-blue-500/30 rounded-2xl p-6">
                            <p class="text-xs text-blue-200">${t('contract:legal_notice')}</p>
                        </div>
                    </div>
                </div>
            `;
            
            initCanvas();
        }
        
        function initCanvas() {
            canvas = document.getElementById('signatureCanvas');
            ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            canvas.addEventListener('touchstart', handleTouchStart);
            canvas.addEventListener('touchmove', handleTouchMove);
            canvas.addEventListener('touchend', stopDrawing);
        }
        
        window.toggleAcceptance = function() {
            const checkbox = document.getElementById('acceptTerms');
            const signatureSection = document.getElementById('signatureSection');
            hasAcceptedTerms = checkbox.checked;
            if (hasAcceptedTerms) signatureSection.classList.remove('opacity-50', 'pointer-events-none');
            else signatureSection.classList.add('opacity-50', 'pointer-events-none');
        };
        
        function getCanvasCoordinates(e, rect) {
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
        }
        
        function getTouchCoordinates(touch, rect) {
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { x: (touch.clientX - rect.left) * scaleX, y: (touch.clientY - rect.top) * scaleY };
        }
        
        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const coords = getCanvasCoordinates(e, rect);
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
            hasSignature = true;
            document.getElementById('validateBtn').disabled = false;
        }
        
        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const coords = getCanvasCoordinates(e, rect);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
        }
        
        function stopDrawing() { isDrawing = false; }
        
        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const coords = getTouchCoordinates(touch, rect);
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
            hasSignature = true;
            document.getElementById('validateBtn').disabled = false;
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const coords = getTouchCoordinates(touch, rect);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
        }
        
        window.clearSignature = function() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            hasSignature = false;
            document.getElementById('validateBtn').disabled = true;
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');
        };
        
        window.validateSignature = async function() {
            if (!hasAcceptedTerms) { showError(t('contract:error_accept_terms')); return; }
            if (!hasSignature) { showError(t('contract:error_sign_first')); return; }
            
            const validateBtn = document.getElementById('validateBtn');
            const originalHTML = validateBtn.innerHTML;
            validateBtn.disabled = true;
            validateBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white inline-block mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                ${t('contract:saving')}
            `;
            
            try {
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                // Fix #9: nom de fichier aléatoire, n'expose plus l'ID utilisateur ni le timestamp
                const randomId = crypto.randomUUID();
                const fileName = `sig_${randomId}.png`;
                
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('contracts').upload(fileName, blob, { contentType: 'image/png', upsert: false });
                if (uploadError) throw uploadError;
                
                const { error: updateError } = await supabase.from('profiles')
                    .update({ contract_path: fileName, contract_status: 'signed', contract_file_url: fileName, contract_signed_at: new Date().toISOString() })
                    .eq('id', currentUser.id);
                if (updateError) throw updateError;
                
                try {
                    const session = await supabase.auth.getSession();
                    const token = session.data.session?.access_token;
                    const { data: profileData } = await supabase.from('profiles').select('name').eq('id', currentUser.id).single();
                    const referrerName = profileData?.name || currentUser.user_metadata?.name || 'Nouvel apporteur';
                    await fetch('https://cgizcgwhwxswvoodqver.supabase.co/functions/v1/send-email-notification', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                        body: JSON.stringify({ referrerName, referrerEmail: currentUser.email, contractPath: fileName })
                    });
                } catch (emailErr) {
                    console.error('Email notification error:', emailErr);
                }
                
                showSuccess(t('contract:success_message'));
                setTimeout(() => {
                    const currentLang = i18next.language || localStorage.getItem('i18nextLng') || 'en';
                    localStorage.setItem('i18nextLng', currentLang);
                    // Fix #9: ?signed=1 simple, sans timestamp qui trahit le moment exact
                    window.location.replace(window.location.origin + '/?signed=1&lang=' + currentLang);
                }, 2000);
                
            } catch (error) {
                showError(t('contract:error') + ': ' + error.message);
                validateBtn.disabled = false;
                validateBtn.innerHTML = originalHTML;
            }
        };
        
        function showError(message) {
            const el = document.getElementById('errorMsg');
            el.textContent = message;
            el.classList.remove('hidden');
            document.getElementById('successMsg').classList.add('hidden');
        }
        
        function showSuccess(message) {
            const el = document.getElementById('successMsg');
            el.textContent = message;
            el.classList.remove('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
        }
        
        const isAuth = await checkAuth();
        if (isAuth) renderSignaturePage();
    })();
    </script>
    <!-- Fix #1: crisp-chat.js supprimé -->
</body>
</html>
